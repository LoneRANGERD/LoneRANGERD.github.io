<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f8f9fa; color: #333; line-height: 1.7; }
    .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; }
    header { text-align: center; margin-bottom: 50px; }
    header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
    header .subtitle { color: #666; font-size: 1.1rem; }
    nav { margin-top: 20px; }
    nav a { color: #0366d6; text-decoration: none; margin: 0 15px; font-size: 0.95rem; }
    nav a:hover { text-decoration: underline; }
    article { background: white; border-radius: 12px; padding: 50px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    article h1 { font-size: 2rem; margin-bottom: 15px; }
    article .meta { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
    article h2 { font-size: 1.5rem; margin: 35px 0 15px; }
    article h3 { font-size: 1.2rem; margin: 25px 0 10px; }
    article p { margin-bottom: 18px; }
    article ul, article ol { margin: 18px 0; padding-left: 25px; }
    article li { margin-bottom: 8px; }
    article pre { background: #f6f8fa; border-radius: 8px; padding: 18px; overflow-x: auto; margin: 20px 0; font-size: 0.9rem; }
    article code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    article pre code { background: none; padding: 0; }
    article a { color: #0366d6; }
    article a:hover { text-decoration: underline; }
    article img { max-width: 100%; border-radius: 8px; margin: 20px 0; }
    footer { text-align: center; margin-top: 50px; color: #888; font-size: 0.9rem; }
    .back-link { display: inline-block; margin-bottom: 30px; color: #0366d6; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    @media (max-width: 600px) { article { padding: 30px 20px; } header h1 { font-size: 1.8rem; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="{{ site.baseurl }}/" style="color:inherit;text-decoration:none">{{ site.title }}</a></h1>
      <p class="subtitle">{{ site.description }}</p>
      <nav>
        <a href="{{ site.baseurl }}/">首页</a>
        <a href="{{ site.baseurl }}/about">关于</a>
      </nav>
    </header>
    <article>
      <a href="{{ site.baseurl }}/" class="back-link">← 返回</a>
      <h1>{{ page.title }}</h1>
      <p class="meta">{{ page.date | date: "%Y年%m月%d日" }}</p>
      {{ content }}
    </article>
    <footer>
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}. 由 <a href="https://jekyllrb.com">Jekyll</a> 驱动.</p>
    </footer>
  </div>
</body>
</html>
